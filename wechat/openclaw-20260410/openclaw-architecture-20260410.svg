<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091634"/>
      <stop offset="100%" stop-color="#0f2f64"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#244a7b" stroke-opacity="0.55" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <text x="70" y="98" fill="#eaf6ff" font-size="60" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif">OpenClaw 三层架构：Gateway - Node - Channel</text>
  <g>
    <rect x="230" y="120" width="1140" height="160" rx="26" fill="#0b2148" fill-opacity="0.65" stroke="#27c6ff" stroke-width="4"/>
    <text x="265" y="182" fill="#eff9ff" font-size="64" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Channel 渠道层</text>
    <text x="265" y="238" fill="#c8e7ff" font-size="42" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Telegram / 飞书 / 微信 / Discord / 钉钉</text>
  </g>
  <g>
    <rect x="230" y="365" width="1140" height="160" rx="26" fill="#0b2148" fill-opacity="0.65" stroke="#4cecae" stroke-width="4"/>
    <text x="265" y="427" fill="#eff9ff" font-size="64" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Gateway 控制层</text>
    <text x="265" y="483" fill="#c8e7ff" font-size="42" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">WebSocket 总线 + 认证 + 路由 (127.0.0.1:18789)</text>
  </g>
  <g>
    <rect x="230" y="610" width="1140" height="160" rx="26" fill="#0b2148" fill-opacity="0.65" stroke="#ffb84c" stroke-width="4"/>
    <text x="265" y="672" fill="#eff9ff" font-size="64" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Node 执行层</text>
    <text x="265" y="728" fill="#c8e7ff" font-size="42" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Agent / Skills / Memory / Tool Calling</text>
  </g>
  <g fill="#b2e8ff" stroke="#b2e8ff" stroke-width="8">
    <line x1="800" y1="292" x2="800" y2="350"/><polygon points="800,370 786,346 814,346"/>
    <line x1="800" y1="537" x2="800" y2="595"/><polygon points="800,615 786,591 814,591"/>
  </g>
</svg>